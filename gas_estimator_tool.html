<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gas费估算工具</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        select{width:100%;padding:10px;margin:15px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
    </style>
</head>
<body>
    <div class="container">
        <h1>以太坊 Gas 费估算</h1>
        <select id="type">
            <option value="transfer">转账交易</option>
            <option value="approve">授权交易</option>
            <option value="mint">NFT铸造</option>
        </select>
        <button class="btn" onclick="estimateGas()">估算 Gas</button>
        <div style="margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px" id="res"></div>
    </div>
<script>
function estimateGas() {
    const type = document.getElementById("type").value;
    const gas = type==="transfer"?21000:type==="approve"?45000:150000;
    document.getElementById("res").innerHTML = `
        <strong>交易类型：</strong>${type}<br>
        <strong>预估Gas：</strong>${gas}<br>
        <strong>建议Gas价格：</strong>30 Gwei
    `;
}
</script>
</body>
</html>
