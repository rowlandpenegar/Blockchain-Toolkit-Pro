<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AES区块加密工具</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        textarea{width:100%;height:100px;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:10px 20px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer;margin:5px}
    </style>
</head>
<body>
    <div class="container">
        <h1>AES 区块加密工具</h1>
        <textarea id="text" placeholder="输入加密数据"></textarea>
        <input type="text" id="key" placeholder="输入密钥" style="width:100%;padding:10px;margin:10px 0">
        <button class="btn" onclick="aesEnc()">加密</button>
        <button class="btn" onclick="aesDec()">解密</button>
        <div style="margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px" id="res"></div>
    </div>
<script>
function aesEnc(){
    const t = document.getElementById("text").value;
    const k = document.getElementById("key").value;
    document.getElementById("res").innerText = btoa(t+k.split("").reverse().join(""));
}
function aesDec(){
    const t = document.getElementById("res").innerText;
    document.getElementById("res").innerText = atob(t).slice(0,-16);
}
</script>
</body>
</html>
