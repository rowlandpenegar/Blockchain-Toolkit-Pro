<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>多签钱包模拟器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer;margin:5px}
        .signers{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}
        .signer{padding:10px;background:#f3f4f6;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>多签钱包模拟器</h1>
        <button class="btn" onclick="addSigner()">添加签名者</button>
        <button class="btn" onclick="signTx()">签名交易</button>
        <div class="signers" id="signers"></div>
        <div style="margin-top:20px" id="status"></div>
    </div>
<script>
let signers = [],required = 2;
function addSigner(){
    signers.push(`签名者${signers.length+1}`);
    render();
}
function signTx(){
    document.getElementById("status").innerText = `已签名：${signers.length}个 | 所需：${required}个 | 交易${signers.length>=required?"已":"未"}生效`;
}
function render(){
    document.getElementById("signers").innerHTML = signers.map(s=>`<div class="signer">${s}</div>`).join("");
}
</script>
</body>
</html>
