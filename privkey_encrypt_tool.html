<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>私钥加密存储</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        input{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
    </style>
</head>
<body>
    <div class="container">
        <h1>私钥加密存储工具</h1>
        <input placeholder="输入私钥" id="privkey">
        <input placeholder="设置加密密码" id="pass" type="password">
        <button class="btn" onclick="encryptPriv()">加密私钥</button>
        <div style="margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px" id="res"></div>
    </div>
<script>
function encryptPriv() {
    const priv = document.getElementById("privkey").value;
    const pass = document.getElementById("pass").value;
    const encrypted = btoa(priv + pass.split("").reverse().join(""));
    document.getElementById("res").innerText = encrypted;
}
</script>
</body>
</html>
