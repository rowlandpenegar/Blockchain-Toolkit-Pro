<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>十六进制转换工具</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        input{width:100%;padding:10px;margin:15px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:10px 20px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer;margin:5px}
    </style>
</head>
<body>
    <div class="container">
        <h1>十六进制编码转换器</h1>
        <input id="input" placeholder="输入文本/数字">
        <div>
            <button class="btn" onclick="toHex()">转十六进制</button>
            <button class="btn" onclick="fromHex()">十六进制转回</button>
        </div>
        <div style="margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px" id="res"></div>
    </div>
<script>
function toHex(){
    const i = document.getElementById("input").value;
    let hex = "";
    for(let j=0;j<i.length;j++) hex += i.charCodeAt(j).toString(16);
    document.getElementById("res").innerText = "0x"+hex;
}
function fromHex(){
    const i = document.getElementById("input").value.replace("0x","");
    let str = "";
    for(let j=0;j<i.length;j+=2) str += String.fromCharCode(parseInt(i.substr(j,2),16));
    document.getElementById("res").innerText = str;
}
</script>
</body>
</html>
