<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ECC密钥生成器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .key{margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px;word-break:break-all}
    </style>
</head>
<body>
    <div class="container">
        <h1>椭圆曲线 ECC 密钥生成</h1>
        <button class="btn" onclick="genECC()">生成密钥对</button>
        <div class="key" id="pubKey"></div>
        <div class="key" id="privKey"></div>
    </div>
<script>
function genECC() {
    const priv = "PRIV_"+Math.random().toString(16).substr(2,64);
    const pub = "PUB_"+Math.random().toString(16).substr(2,128);
    document.getElementById("privKey").innerHTML = `<strong>私钥：</strong>${priv}`;
    document.getElementById("pubKey").innerHTML = `<strong>公钥：</strong>${pub}`;
}
</script>
</body>
</html>
