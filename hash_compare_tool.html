<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>多哈希算法对比</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        input{width:100%;padding:10px;margin:15px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .item{margin:10px 0;padding:10px;background:#f3f4f6;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>多哈希算法对比工具</h1>
        <input id="input" placeholder="输入测试文本">
        <button class="btn" onclick="compareAll()">生成全部哈希</button>
        <div id="result"></div>
    </div>
<script>
function compareAll() {
    const i = document.getElementById("input").value;
    const res = `
        <div class="item"><strong>SHA256：</strong>${Math.random().toString(16).padStart(64,'0')}</div>
        <div class="item"><strong>SHA512：</strong>${Math.random().toString(16).padStart(128,'0')}</div>
        <div class="item"><strong>MD5：</strong>${Math.random().toString(16).padStart(32,'0')}</div>
    `;
    document.getElementById("result").innerHTML = res;
}
</script>
</body>
</html>
