<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UTXO模型管理器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .utxo{margin-top:20px;padding:15px;border:1px solid #e5e7eb;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>UTXO 交易模型模拟</h1>
        <button class="btn" onclick="genUTXO()">生成 UTXO</button>
        <button class="btn" onclick="spendUTXO()">花费 UTXO</button>
        <div class="utxo" id="res"></div>
    </div>
<script>
let utxoList = [];
function genUTXO() {
    const utxo = {id:Math.random().toString(16).substr(2,16),value:(Math.random()*10).toFixed(4)};
    utxoList.push(utxo);
    render();
}
function spendUTXO() {
    if(utxoList.length>0) utxoList.pop();
    render();
}
function render() {
    document.getElementById("res").innerHTML = utxoList.map(u=>`UTXO ID：${u.id} 金额：${u.value} BTC`).join("<br>") || "无可用UTXO";
}
</script>
</body>
</html>
