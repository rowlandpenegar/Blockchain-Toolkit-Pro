<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>兑换路由模拟器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        input{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
    </style>
</head>
<body>
    <div class="container">
        <h1>去中心化交易所路由模拟</h1>
        <input placeholder="支付代币数量" id="pay" type="number" value="1">
        <input placeholder="滑点设置(%)" id="slippage" value="0.5">
        <button class="btn" onclick="calcSwap()">计算兑换</button>
        <div style="margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px" id="res"></div>
    </div>
<script>
function calcSwap() {
    const pay = parseFloat(document.getElementById("pay").value);
    const slip = parseFloat(document.getElementById("slippage").value);
    const receive = (pay * 1500).toFixed(2);
    const minReceive = (receive * (1-slip/100)).toFixed(2);
    document.getElementById("res").innerHTML = `
        <strong>预计获得：</strong>${receive} USDT<br>
        <strong>最小获得：</strong>${minReceive} USDT<br>
        <strong>滑点：</strong>${slip}%
    `;
}
</script>
</body>
</html>
