<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>区块链浏览器模拟</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        input{width:100%;padding:10px;margin:15px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .info{margin-top:20px;padding:15px;border:1px solid #e5e7eb;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>简易区块链浏览器</h1>
        <input id="query" placeholder="输入区块高度/地址/交易哈希">
        <button class="btn" onclick="search()">查询</button>
        <div class="info" id="info"></div>
    </div>
<script>
function search() {
    const q = document.getElementById("query").value;
    document.getElementById("info").innerHTML = `
        <strong>查询内容：</strong>${q}<br>
        <strong>区块高度：</strong>${Math.floor(Math.random()*10000)}<br>
        <strong>交易数量：</strong>${Math.floor(Math.random()*200)}<br>
        <strong>时间戳：</strong>${new Date().getTime()}<br>
        <strong>状态：</strong>已确认
    `;
}
</script>
</body>
</html>
