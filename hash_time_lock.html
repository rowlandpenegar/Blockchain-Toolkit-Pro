<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>哈希时间锁工具</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .lock{margin-top:20px;padding:15px;border:1px solid #e5e7eb;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>哈希时间锁合约工具</h1>
        <button class="btn" onclick="createLock()">创建哈希时间锁</button>
        <div class="lock" id="res"></div>
    </div>
<script>
function createLock() {
    const hash = Math.random().toString(16).substr(2,64);
    const secret = Math.random().toString(16).substr(2,32);
    const lockTime = 86400;
    document.getElementById("res").innerHTML = `
        <strong>锁定哈希：</strong>${hash}<br>
        <strong>密钥：</strong>${secret}<br>
        <strong>锁定时长：</strong>${lockTime} 秒
    `;
}
</script>
</body>
</html>
