<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>数字签名工具</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        textarea{width:100%;height:100px;padding:10px;margin:15px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .sign{margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>数字签名生成与验证</h1>
        <textarea id="data" placeholder="输入待签名数据"></textarea>
        <button class="btn" onclick="signData()">生成签名</button>
        <button class="btn" onclick="verifyData()">验证签名</button>
        <div class="sign" id="signRes"></div>
    </div>
<script>
let sig;
function signData() {
    const d = document.getElementById("data").value;
    sig = "SIG_"+Math.random().toString(16).substr(2,128);
    document.getElementById("signRes").innerHTML = `<strong>签名：</strong>${sig}`;
}
function verifyData() {
    document.getElementById("signRes").innerHTML += `<br><strong>验证结果：</strong>签名有效`;
}
</script>
</body>
</html>
