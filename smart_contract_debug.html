<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>智能合约调试器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        textarea{width:100%;height:150px;padding:10px;margin:15px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .log{margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>智能合约调试模拟器</h1>
        <textarea id="code" placeholder="输入合约代码片段"></textarea>
        <button class="btn" onclick="debugContract()">调试合约</button>
        <div class="log" id="log"></div>
    </div>
<script>
function debugContract() {
    document.getElementById("log").innerHTML = `
        <strong>调试状态：</strong>执行成功<br>
        <strong>消耗Gas：</strong>${Math.floor(Math.random()*100000)}<br>
        <strong>返回值：</strong>${Math.random().toString(16)}<br>
        <strong>无语法错误</strong>
    `;
}
</script>
</body>
</html>
