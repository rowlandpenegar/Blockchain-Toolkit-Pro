<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>质押收益计算器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        input{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
    </style>
</head>
<body>
    <div class="container">
        <h1>PoS 质押收益计算器</h1>
        <input placeholder="质押金额" id="amount" value="10000">
        <input placeholder="年化收益率(%)" id="apr" value="8">
        <input placeholder="质押天数" id="days" value="365">
        <button class="btn" onclick="calcStaking()">计算收益</button>
        <div style="margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px" id="res"></div>
    </div>
<script>
function calcStaking() {
    const a = parseFloat(document.getElementById("amount").value);
    const apr = parseFloat(document.getElementById("apr").value);
    const d = parseFloat(document.getElementById("days").value);
    const profit = a * apr / 100 * d / 365;
    document.getElementById("res").innerHTML = `
        <strong>总收益：</strong>${profit.toFixed(2)}<br>
        <strong>本息合计：</strong>${(a+profit).toFixed(2)}
    `;
}
</script>
</body>
</html>
