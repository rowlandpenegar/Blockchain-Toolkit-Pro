<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>代币合约模拟器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        input{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .log{margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>同质化代币合约模拟</h1>
        <input placeholder="发送地址" id="from">
        <input placeholder="接收地址" id="to">
        <input placeholder="转账数量" id="amount" type="number">
        <button class="btn" onclick="transfer()">执行转账</button>
        <div class="log" id="log"></div>
    </div>
<script>
const balances = {};
function transfer() {
    const f = document.getElementById("from").value;
    const t = document.getElementById("to").value;
    const a = parseFloat(document.getElementById("amount").value);
    if(!balances[f]) balances[f] = 1000000;
    if(balances[f]>=a){
        balances[f]-=a;
        balances[t]=(balances[t]||0)+a;
        document.getElementById("log").innerHTML = `转账成功<br>发送方余额：${balances[f]}<br>接收方余额：${balances[t]}`;
    }else{
        document.getElementById("log").innerHTML = "余额不足";
    }
}
</script>
</body>
</html>
