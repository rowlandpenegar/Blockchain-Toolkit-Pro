<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Base58编码解码</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        input{width:100%;padding:10px;margin:15px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:10px 20px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer;margin:5px}
        .res{margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>Base58 编码解码工具</h1>
        <input id="input" placeholder="输入文本/地址">
        <div>
            <button class="btn" onclick="encode()">编码</button>
            <button class="btn" onclick="decode()">解码</button>
        </div>
        <div class="res" id="result"></div>
    </div>
<script>
const alphabet = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
function encode(){
    const str = document.getElementById("input").value;
    let enc = "";
    for(let i=0;i<str.length;i++) enc += alphabet[str.charCodeAt(i)%alphabet.length];
    document.getElementById("result").innerText = enc;
}
function decode(){
    const str = document.getElementById("input").value;
    let dec = "";
    for(let i=0;i<str.length;i++) dec += String.fromCharCode(alphabet.indexOf(str[i])+48);
    document.getElementById("result").innerText = dec;
}
</script>
</body>
</html>
