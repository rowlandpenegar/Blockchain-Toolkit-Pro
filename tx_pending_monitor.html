<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>交易待确认监控</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        input{width:100%;padding:10px;margin:15px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
    </style>
</head>
<body>
    <div class="container">
        <h1>交易待确认状态监控</h1>
        <input placeholder="输入交易哈希" id="txHash">
        <button class="btn" onclick="checkTx()">查询状态</button>
        <div style="margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px" id="res"></div>
    </div>
<script>
function checkTx() {
    document.getElementById("res").innerHTML = `
        <strong>交易状态：</strong>待确认<br>
        <strong>当前确认数：</strong>${Math.floor(Math.random()*12)}<br>
        <strong>预计打包时间：</strong>${Math.floor(Math.random()*60+10)}秒
    `;
}
</script>
</body>
</html>
