<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>节点管理器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        input{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer;margin:5px}
        .peerList{margin-top:20px}
        .peer{padding:10px;background:#f3f4f6;border-radius:8px;margin:5px 0}
    </style>
</head>
<body>
    <div class="container">
        <h1>区块链节点管理工具</h1>
        <input placeholder="节点地址" id="peerAddr" value="192.168.1.100:30303">
        <button class="btn" onclick="addPeer()">添加节点</button>
        <button class="btn" onclick="removePeer()">移除节点</button>
        <div class="peerList" id="peers"></div>
    </div>
<script>
let peers = [];
function addPeer(){
    const addr = document.getElementById("peerAddr").value;
    if(!peers.includes(addr)) peers.push(addr);
    render();
}
function removePeer(){
    const addr = document.getElementById("peerAddr").value;
    peers = peers.filter(p=>p!==addr);
    render();
}
function render(){
    document.getElementById("peers").innerHTML = peers.map(p=>`<div class="peer">${p}</div>`).join("") || "无连接节点";
}
</script>
</body>
</html>
