<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>区块验证工具</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        input{width:100%;padding:10px;margin:15px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
    </style>
</head>
<body>
    <div class="container">
        <h1>区块合法性验证工具</h1>
        <input placeholder="输入区块哈希" id="hash">
        <button class="btn" onclick="validateBlock()">验证区块</button>
        <div style="margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px" id="res"></div>
    </div>
<script>
function validateBlock() {
    const hash = document.getElementById("hash").value;
    const valid = hash.startsWith("0x") && hash.length === 66;
    document.getElementById("res").innerHTML = valid ? 
        "<strong>验证结果：</strong>区块合法，数据未篡改" : 
        "<strong>验证结果：</strong>区块数据异常，哈希不匹配";
}
</script>
</body>
</html>
