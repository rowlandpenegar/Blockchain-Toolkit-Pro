<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>区块链部署模拟器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .progress{margin-top:20px;height:20px;background:#e5e7eb;border-radius:10px;overflow:hidden}
        .bar{height:100%;background:#2563eb;width:0}
    </style>
</head>
<body>
    <div class="container">
        <h1>区块链网络部署模拟</h1>
        <button class="btn" onclick="deployChain()">开始部署</button>
        <div class="progress"><div class="bar" id="bar"></div></div>
        <div style="margin-top:15px" id="status"></div>
    </div>
<script>
function deployChain() {
    let p = 0;
    const bar = document.getElementById("bar");
    const status = document.getElementById("status");
    const timer = setInterval(()=>{
        p+=10;
        bar.style.width = p+"%";
        status.innerText = `部署进度：${p}%`;
        if(p>=100){
            clearInterval(timer);
            status.innerText = "区块链部署完成 | 节点数：10 | 创世区块已生成";
        }
    },300);
}
</script>
</body>
</html>
