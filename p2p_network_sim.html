<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>P2P网络模拟器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer;margin:5px}
        .nodes{margin-top:20px;display:flex;flex-wrap:wrap;gap:10px}
        .node{padding:10px;background:#2563eb;color:white;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>区块链 P2P 网络模拟</h1>
        <button class="btn" onclick="addNode()">添加节点</button>
        <button class="btn" onclick="syncData()">同步数据</button>
        <div class="nodes" id="nodes"></div>
        <div style="margin-top:20px" id="status"></div>
    </div>
<script>
let nodeList = [];
function addNode() {
    const node = `节点${Math.floor(Math.random()*1000)}`;
    nodeList.push(node);
    renderNodes();
}
function renderNodes() {
    document.getElementById("nodes").innerHTML = nodeList.map(n=>`<div class="node">${n}</div>`).join("");
}
function syncData() {
    document.getElementById("status").innerText = `网络节点：${nodeList.length}个 | 区块数据同步完成`;
}
</script>
</body>
</html>
