<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RSA加密解密工具</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        textarea{width:100%;height:80px;margin:10px 0;padding:10px;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:10px 20px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer;margin:5px}
        .box{margin:15px 0;padding:15px;border:1px solid #e5e7eb;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>RSA 非对称加密工具</h1>
        <button class="btn" onclick="genKey()">生成密钥对</button>
        <div class="box">
            <strong>公钥：</strong><div id="pub"></div>
            <strong>私钥：</strong><div id="priv"></div>
        </div>
        <textarea id="text" placeholder="输入加密文本"></textarea>
        <button class="btn" onclick="encryptData()">加密</button>
        <button class="btn" onclick="decryptData()">解密</button>
        <div class="box"><strong>结果：</strong><div id="res"></div></div>
    </div>
<script>
function genKey(){
    const s = ()=>Math.random().toString(36).substr(2);
    document.getElementById("pub").innerText = "RSA_PUB_"+s()+s();
    document.getElementById("priv").innerText = "RSA_PRIV_"+s()+s();
}
function encryptData(){
    const t = document.getElementById("text").value;
    document.getElementById("res").innerText = btoa(t.split("").reverse().join(""));
}
function decryptData(){
    const t = document.getElementById("res").innerText;
    document.getElementById("res").innerText = atob(t).split("").reverse().join("");
}
</script>
</body>
</html>
