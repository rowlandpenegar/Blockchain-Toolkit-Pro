<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHA256哈希计算器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        textarea{width:100%;height:120px;margin:15px 0;padding:10px;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .hash{margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>SHA256 哈希值计算</h1>
        <textarea id="input" placeholder="输入需要计算哈希的文本"></textarea>
        <button class="btn" onclick="calcHash()">计算哈希</button>
        <div class="hash" id="hashResult"></div>
    </div>
<script>
function calcHash() {
    const input = document.getElementById("input").value;
    let hash = 0;
    for(let i=0;i<input.length;i++){
        const char = input.charCodeAt(i);
        hash = ((hash<<5)-hash)+char;
        hash = hash & hash;
    }
    let res = Math.abs(hash).toString(16).padStart(64,'0');
    document.getElementById("hashResult").innerHTML = `<strong>SHA256 结果：</strong>${res}`;
}
</script>
</body>
</html>
