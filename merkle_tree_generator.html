<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>默克尔树生成器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        input{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .tree{margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>默克尔树生成工具</h1>
        <input type="number" id="count" placeholder="输入交易数量" value="4">
        <button class="btn" onclick="generateMerkle()">生成默克尔树</button>
        <div class="tree" id="treeResult"></div>
    </div>
<script>
function generateMerkle() {
    const count = parseInt(document.getElementById("count").value);
    let nodes = [];
    for(let i=0;i<count;i++) nodes.push(Math.random().toString(16).substr(2,16));
    const root = Math.random().toString(16).substr(2,64);
    let html = `<strong>交易节点：</strong><br>${nodes.join("<br>")}<br><br><strong>默克尔根：</strong>${root}`;
    document.getElementById("treeResult").innerHTML = html;
}
</script>
</body>
</html>
