<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>跨链交易模拟器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        input{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
    </style>
</head>
<body>
    <div class="container">
        <h1>跨链资产转移模拟</h1>
        <input placeholder="源链地址" id="from">
        <input placeholder="目标链地址" id="to">
        <input placeholder="转移数量" id="amount" type="number">
        <button class="btn" onclick="crossChain()">执行跨链</button>
        <div style="margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px" id="res"></div>
    </div>
<script>
function crossChain() {
    document.getElementById("res").innerHTML = `
        <strong>跨链交易发起成功</strong><br>
        跨链ID：${Math.random().toString(16).substr(2,32)}<br>
        状态：等待节点验证 | 预计完成时间：30秒
    `;
}
</script>
</body>
</html>
