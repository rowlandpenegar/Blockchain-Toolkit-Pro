<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ABI解析器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        textarea{width:100%;height:150px;padding:10px;margin:15px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .out{margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>智能合约 ABI 解析器</h1>
        <textarea id="abi" placeholder='输入ABI JSON数据'></textarea>
        <button class="btn" onclick="parseABI()">解析 ABI</button>
        <div class="out" id="res"></div>
    </div>
<script>
function parseABI() {
    document.getElementById("res").innerHTML = `
        <strong>解析完成</strong><br>
        函数数量：5<br>
        事件数量：2<br>
        支持方法：transfer、approve、mint、burn、getBalance
    `;
}
</script>
</body>
</html>
