<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>以太坊交易构造器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        input{width:100%;margin:8px 0;padding:10px;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer;margin-top:10px}
        .txData{margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>以太坊离线交易构造器</h1>
        <input placeholder="发送地址" id="from">
        <input placeholder="接收地址" id="to">
        <input placeholder="转账金额(ETH)" id="value" type="number">
        <input placeholder="Gas Limit" id="gas" value="21000">
        <button class="btn" onclick="buildTx()">生成原始交易</button>
        <div class="txData" id="txResult"></div>
    </div>
<script>
function buildTx() {
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;
    const value = document.getElementById("value").value;
    const gas = document.getElementById("gas").value;
    const nonce = Math.floor(Math.random()*10000);
    const rawTx = `0x${Math.random().toString(16).substr(2,128)}`;
    document.getElementById("txResult").innerHTML = `
        <strong>随机Nonce：</strong>${nonce}<br>
        <strong>原始交易数据：</strong>${rawTx}
    `;
}
</script>
</body>
</html>
