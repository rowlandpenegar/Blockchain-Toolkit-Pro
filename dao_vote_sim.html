<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DAO投票模拟器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer;margin:5px}
        .vote{margin-top:20px;padding:15px;border:1px solid #e5e7eb;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>DAO 治理投票模拟</h1>
        <button class="btn" onclick="voteYes()">赞成</button>
        <button class="btn" onclick="voteNo()">反对</button>
        <div class="vote" id="res"></div>
    </div>
<script>
let yes=0,no=0;
function voteYes(){yes++;render()}
function voteNo(){no++;render()}
function render(){
    document.getElementById("res").innerHTML = `
        <strong>赞成：</strong>${yes} 票<br>
        <strong>反对：</strong>${no} 票<br>
        <strong>投票进度：</strong>${((yes+no)/100*100).toFixed(0)}%
    `;
}
</script>
</body>
</html>
