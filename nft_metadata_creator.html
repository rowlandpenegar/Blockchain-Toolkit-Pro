<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NFT元数据生成器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        input{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .meta{margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px;white-space:pre-wrap}
    </style>
</head>
<body>
    <div class="container">
        <h1>NFT 元数据生成器</h1>
        <input placeholder="NFT名称" id="name" value="Genesis NFT">
        <input placeholder="描述" id="desc" value="Genesis Collection NFT">
        <input placeholder="图片URL" id="img" value="ipfs://xxxx">
        <button class="btn" onclick="genMeta()">生成元数据</button>
        <div class="meta" id="metaResult"></div>
    </div>
<script>
function genMeta() {
    const name = document.getElementById("name").value;
    const desc = document.getElementById("desc").value;
    const img = document.getElementById("img").value;
    const meta = {
        name,description:desc,image:img,
        attributes:[{trait_type:"Level",value:1},{trait_type:"Rarity",value:"Legendary"}]
    };
    document.getElementById("metaResult").innerText = JSON.stringify(meta,null,2);
}
</script>
</body>
</html>
