<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>链上数据分析</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .card{margin-top:20px;padding:15px;border:1px solid #e5e7eb;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>区块链数据可视化分析</h1>
        <button class="btn" onclick="loadData()">加载链上数据</button>
        <div class="card" id="data"></div>
    </div>
<script>
function loadData() {
    document.getElementById("data").innerHTML = `
        <strong>当前区块高度：</strong>${Math.floor(Math.random()*1000000)}<br>
        <strong>24h交易数量：</strong>${Math.floor(Math.random()*1000000)}<br>
        <strong>活跃地址数：</strong>${Math.floor(Math.random()*500000)}<br>
        <strong>平均区块间隔：</strong>${(Math.random()*10+2).toFixed(1)}秒
    `;
}
</script>
</body>
</html>
