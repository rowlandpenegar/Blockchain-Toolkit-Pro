<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>轻节点模拟器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .info{margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>区块链轻节点模拟器</h1>
        <button class="btn" onclick="startSync()">启动区块头同步</button>
        <div class="info" id="res"></div>
    </div>
<script>
function startSync() {
    document.getElementById("res").innerHTML = `
        <strong>节点类型：</strong>轻节点<br>
        <strong>同步状态：</strong>同步中<br>
        <strong>已同步区块头：</strong>${Math.floor(Math.random()*1000000)}<br>
        <strong>内存占用：</strong>${(Math.random()*50+50).toFixed(1)} MB
    `;
}
</script>
</body>
</html>
