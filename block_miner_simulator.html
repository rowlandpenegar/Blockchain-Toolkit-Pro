<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>区块挖矿模拟器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .block{margin-top:20px;padding:20px;border:1px solid #e5e7eb;border-radius:12px}
        .mining{color:red}
    </style>
</head>
<body>
    <div class="container">
        <h1>PoW 工作量证明挖矿</h1>
        <button class="btn" onclick="startMining()">开始挖矿</button>
        <div class="block" id="blockInfo"></div>
    </div>
<script>
function startMining() {
    const info = document.getElementById("blockInfo");
    info.innerHTML = "<div class='mining'>挖矿中...</div>";
    setTimeout(()=>{
        const height = Math.floor(Math.random()*10000);
        const hash = "0x"+Math.random().toString(16).substr(2,64);
        const prevHash = "0x"+Math.random().toString(16).substr(2,64);
        const nonce = Math.floor(Math.random()*100000000);
        info.innerHTML = `
            <strong>区块高度：</strong>${height}<br>
            <strong>上一区块哈希：</strong>${prevHash}<br>
            <strong>当前区块哈希：</strong>${hash}<br>
            <strong>随机数Nonce：</strong>${nonce}<br>
            <strong>挖矿成功！</strong>
        `;
    },800);
}
</script>
</body>
</html>
