<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BIP39助记词生成器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .words{margin-top:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
        .word{padding:10px;background:#f3f4f6;border-radius:8px;text-align:center}
    </style>
</head>
<body>
    <div class="container">
        <h1>BIP39 助记词生成器</h1>
        <button class="btn" onclick="generateWords()">生成 12 位助记词</button>
        <div class="words" id="words"></div>
    </div>
<script>
const wordList = ["apple","banana","cat","dog","egg","fish","goat","hat","ice","juice","kite","lion","monkey","nose","orange","pen","queen","rabbit","sun","tiger","umbrella","van","water","xmas","yellow","zoo"];
function generateWords() {
    let words = [];
    for(let i=0;i<12;i++) words.push(wordList[Math.floor(Math.random()*wordList.length)]);
    document.getElementById("words").innerHTML = words.map(w=>`<div class="word">${w}</div>`).join("");
}
</script>
</body>
</html>
