<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PoS共识模拟器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
        .result{margin-top:20px;padding:15px;border:1px solid #e5e7eb;border-radius:8px}
    </style>
</head>
<body>
    <div class="container">
        <h1>PoS 权益证明共识模拟</h1>
        <button class="btn" onclick="electNode()">选举出块节点</button>
        <div class="result" id="res"></div>
    </div>
<script>
function electNode() {
    const nodes = ["节点A","节点B","节点C","节点D","节点E"];
    const stakes = [10000,50000,30000,80000,20000];
    const total = stakes.reduce((a,b)=>a+b,0);
    const rand = Math.random()*total;
    let sum=0,selected;
    for(let i=0;i<nodes.length;i++){sum+=stakes[i];if(rand<=sum){selected=i;break;}}
    document.getElementById("res").innerHTML = `
        <strong>总质押金额：</strong>${total}<br>
        <strong>选中出块节点：</strong>${nodes[selected]}<br>
        <strong>节点质押金额：</strong>${stakes[selected]}
    `;
}
</script>
</body>
</html>
