<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>交易手续费计算器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        input{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
    </style>
</head>
<body>
    <div class="container">
        <h1>区块链交易手续费计算器</h1>
        <input placeholder="Gas Price (Gwei)" id="gasPrice" value="30">
        <input placeholder="Gas Limit" id="gasLimit" value="21000">
        <button class="btn" onclick="calcFee()">计算手续费</button>
        <div style="margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px" id="res"></div>
    </div>
<script>
function calcFee() {
    const gp = parseFloat(document.getElementById("gasPrice").value);
    const gl = parseFloat(document.getElementById("gasLimit").value);
    const fee = (gp * gl) / 1e9;
    document.getElementById("res").innerHTML = `
        <strong>预估手续费：</strong>${fee.toFixed(6)} ETH<br>
        <strong>等值美元：</strong>${(fee*1800).toFixed(2)} USD
    `;
}
</script>
</body>
</html>
