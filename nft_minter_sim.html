<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NFT铸造模拟器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        input{width:100%;padding:10px;margin:8px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer}
    </style>
</head>
<body>
    <div class="container">
        <h1>NFT 铸造模拟器</h1>
        <input placeholder="接收钱包地址" id="wallet">
        <input placeholder="NFT ID" id="nftId" value="1001">
        <button class="btn" onclick="mintNFT()">铸造 NFT</button>
        <div style="margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px" id="res"></div>
    </div>
<script>
function mintNFT() {
    const wallet = document.getElementById("wallet").value;
    const nftId = document.getElementById("nftId").value;
    const txHash = "0x"+Math.random().toString(16).substr(2,64);
    document.getElementById("res").innerHTML = `
        <strong>铸造成功</strong><br>
        钱包地址：${wallet}<br>
        NFT ID：${nftId}<br>
        交易哈希：${txHash}
    `;
}
</script>
</body>
</html>
