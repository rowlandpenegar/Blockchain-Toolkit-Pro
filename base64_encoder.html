<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Base64编码解码</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        textarea{width:100%;height:100px;padding:10px;margin:15px 0;border-radius:8px;border:1px solid #e5e7eb}
        .btn{padding:10px 20px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer;margin:5px}
    </style>
</head>
<body>
    <div class="container">
        <h1>Base64 编码解码工具</h1>
        <textarea id="input" placeholder="输入文本"></textarea>
        <div>
            <button class="btn" onclick="enc64()">编码</button>
            <button class="btn" onclick="dec64()">解码</button>
        </div>
        <div style="margin-top:20px;padding:15px;background:#f3f4f6;border-radius:8px" id="res"></div>
    </div>
<script>
function enc64(){
    document.getElementById("res").innerText = btoa(document.getElementById("input").value);
}
function dec64(){
    document.getElementById("res").innerText = atob(document.getElementById("input").value);
}
</script>
</body>
</html>
