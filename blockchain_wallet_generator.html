<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>区块链钱包生成器</title>
    <style>
        *{margin:0;padding:0;font-family:Arial}
        .container{max-width:900px;margin:30px auto;padding:20px}
        .btn{padding:12px 24px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer;margin:10px 0}
        .card{border:1px solid #e5e7eb;padding:20px;border-radius:12px;margin:15px 0}
        .result{margin-top:15px;line-height:1.8}
    </style>
</head>
<body>
    <div class="container">
        <h1>区块链离线钱包生成器</h1>
        <button class="btn" onclick="generateWallet()">生成钱包</button>
        <div class="card">
            <div class="result" id="result"></div>
        </div>
    </div>
<script>
function generateWallet() {
    const chars = "0123456789abcdef";
    let privKey = "";
    for(let i=0;i<64;i++) privKey += chars[Math.floor(Math.random()*16)];
    let pubKey = "";
    for(let i=0;i<66;i++) pubKey += chars[Math.floor(Math.random()*16)];
    let address = "0x";
    for(let i=0;i<40;i++) address += chars[Math.floor(Math.random()*16)];
    document.getElementById("result").innerHTML = `
        <strong>私钥：</strong>${privKey}<br>
        <strong>公钥：</strong>${pubKey}<br>
        <strong>钱包地址：</strong>${address}
    `;
}
</script>
</body>
</html>
